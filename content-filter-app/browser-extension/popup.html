<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Content Filter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 300px;
            min-height: 400px;
        }

        .container {
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 10px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        h1 {
            font-size: 18px;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 12px;
            opacity: 0.8;
        }

        .status-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        .status-dot.disabled {
            background: #f87171;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .stat-label {
            font-size: 11px;
            opacity: 0.8;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .settings-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .settings-label {
            font-size: 12px;
            opacity: 0.8;
        }

        .settings-value {
            font-size: 12px;
            font-family: monospace;
        }

        .footer {
            margin-top: 20px;
            text-align: center;
        }

        .footer-link {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 11px;
        }

        .footer-link:hover {
            color: white;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🛡️</div>
            <h1>Content Filter</h1>
            <div class="subtitle">Advanced content filtering and blocking</div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Loading...</div>
        </div>

        <div id="main-content" style="display: none;">
            <div class="status-card">
                <div class="status-indicator">
                    <div id="statusDot" class="status-dot"></div>
                    <span id="statusText">Enabled</span>
                </div>
                <div id="apiStatus">API: Connecting...</div>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <div id="blockedCount" class="stat-value">-</div>
                    <div class="stat-label">BLOCKED</div>
                </div>
                <div class="stat-item">
                    <div id="cacheSize" class="stat-value">-</div>
                    <div class="stat-label">CACHED</div>
                </div>
            </div>

            <div class="controls">
                <button id="toggleBtn" class="btn btn-primary">
                    🔄 Disable Filtering
                </button>

                <button id="clearCacheBtn" class="btn btn-secondary">
                    🧹 Clear Cache
                </button>

                <button id="resetStatsBtn" class="btn btn-secondary">
                    📊 Reset Statistics
                </button>
            </div>

            <div class="settings-section">
                <div class="settings-row">
                    <span class="settings-label">API URL:</span>
                    <span id="apiUrl" class="settings-value">localhost:3000</span>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Cache Timeout:</span>
                    <span class="settings-value">5 minutes</span>
                </div>
                <div class="settings-row">
                    <span class="settings-label">Version:</span>
                    <span class="settings-value">1.0.0</span>
                </div>
            </div>

            <div class="footer">
                <a href="#" class="footer-link" id="optionsLink">⚙️ Advanced Settings</a>
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
